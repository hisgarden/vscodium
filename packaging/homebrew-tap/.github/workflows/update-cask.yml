name: Update VSCodium Cask

on:
  # Triggered by hisgarden/vscodium publish-stable-macos.yml after a successful release.
  # The dispatching workflow must set client_payload.version and client_payload.quality.
  repository_dispatch:
    types:
      - release-published

  # Manual dispatch when needed (e.g., to seed first release).
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (tag on hisgarden/vscodium, e.g. 1.108.28028)"
        required: true
        type: string
      quality:
        description: "stable or insider"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - insider

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve inputs
        id: vars
        env:
          EVENT_VERSION: ${{ github.event.client_payload.version || inputs.version }}
          EVENT_QUALITY: ${{ github.event.client_payload.quality || inputs.quality }}
        run: |
          set -euo pipefail

          # Strict validation at the trust boundary. Rejects newline / quote / shell
          # metacharacter injection from repository_dispatch payloads before any
          # further step consumes these values.
          if ! [[ "${EVENT_VERSION}" =~ ^[0-9]+(\.[0-9]+){1,3}([.-][A-Za-z0-9.]+)?$ ]]; then
            echo "::error::EVENT_VERSION=${EVENT_VERSION} failed strict semver validation"
            exit 1
          fi
          if ! [[ "${EVENT_QUALITY}" =~ ^(stable|insider)$ ]]; then
            echo "::error::EVENT_QUALITY=${EVENT_QUALITY} must be 'stable' or 'insider'"
            exit 1
          fi

          # Heredoc-delimited form is defense-in-depth: even if the regex above
          # ever misses a newline, the delimiter form prevents multi-line values
          # from injecting additional output keys.
          {
            printf 'version<<OUTPUT_EOF\n%s\nOUTPUT_EOF\n' "${EVENT_VERSION}"
            printf 'quality<<OUTPUT_EOF\n%s\nOUTPUT_EOF\n' "${EVENT_QUALITY}"
          } >> "$GITHUB_OUTPUT"

          if [[ "${EVENT_QUALITY}" == "insider" ]]; then
            {
              echo "cask=Casks/vscodium-insiders.rb"
              echo "app=VSCodium-Insiders"
              echo "repo=hisgarden/vscodium-insiders"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "cask=Casks/vscodium.rb"
              echo "app=VSCodium"
              echo "repo=hisgarden/vscodium"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch SHA256 sums per arch
        id: sums
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          APP: ${{ steps.vars.outputs.app }}
          REPO: ${{ steps.vars.outputs.repo }}
        run: |
          set -euo pipefail

          fetch_sha() {
            local arch="$1"
            local url="https://github.com/${REPO}/releases/download/${VERSION}/${APP}.${arch}.${VERSION}.dmg.sha256"
            # The publish pipeline uploads .sha256 files alongside the dmg.
            # Format is: "<sha>  <filename>".
            curl -fsSL "$url" | awk '{ print $1 }'
          }

          arm64_sha=$(fetch_sha arm64)
          x64_sha=$(fetch_sha x64)

          echo "arm64=${arm64_sha}" >> "$GITHUB_OUTPUT"
          echo "x64=${x64_sha}" >> "$GITHUB_OUTPUT"

      - name: Bump cask version + sha256
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          CASK: ${{ steps.vars.outputs.cask }}
          ARM64_SHA: ${{ steps.sums.outputs.arm64 }}
          X64_SHA: ${{ steps.sums.outputs.x64 }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os, re, pathlib, sys

          version = os.environ["VERSION"]
          cask_path = os.environ["CASK"]
          arm64_sha = os.environ["ARM64_SHA"]
          x64_sha = os.environ["X64_SHA"]

          # Defense-in-depth: re-validate all untrusted inputs at this sink even
          # though the Resolve-inputs step already did. Version already passed the
          # shell regex; this is redundant-but-cheap. SHAs come from .sha256 files
          # fetched over HTTPS — validate format before writing into the cask.
          if not re.fullmatch(r"[0-9]+(\.[0-9]+){1,3}([.-][A-Za-z0-9.]+)?", version):
            sys.exit(f"VERSION failed validation: {version!r}")
          if not re.fullmatch(r"[0-9a-f]{64}", arm64_sha):
            sys.exit(f"ARM64_SHA not a sha256: {arm64_sha!r}")
          if not re.fullmatch(r"[0-9a-f]{64}", x64_sha):
            sys.exit(f"X64_SHA not a sha256: {x64_sha!r}")
          # cask_path is set from step outputs with a hardcoded value per quality;
          # still ensure it lives inside Casks/ to prevent arbitrary file overwrite.
          cask = pathlib.Path(cask_path)
          if cask.parts[:1] != ("Casks",) or ".." in cask.parts:
            sys.exit(f"CASK must be under Casks/: {cask_path!r}")

          text = cask.read_text()

          # Use a replacement function to avoid backslash/backreference interpretation
          # in re.sub's replacement string. version has already been validated to
          # contain only [0-9.A-Za-z-] so this is belt-and-braces.
          text = re.sub(
            r'version "[^"]+"',
            lambda _m: f'version "{version}"',
            text,
            count=1,
          )

          # Replace the two sha256 lines in order (arm first, then intel, matching file layout).
          pattern = re.compile(r'sha256 "([0-9a-f]{64})"')
          shas = [arm64_sha, x64_sha]
          out = []
          i = 0
          for line in text.splitlines(keepends=True):
            m = pattern.search(line)
            if m and i < len(shas):
              line = line.replace(m.group(1), shas[i])
              i += 1
            out.append(line)
          cask.write_text("".join(out))
          PY

      - name: Commit and push
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          QUALITY: ${{ steps.vars.outputs.quality }}
          CASK: ${{ steps.vars.outputs.cask }}
        run: |
          git config user.name "hisgarden-bot"
          git config user.email "hisgarden-bot@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes — cask already at ${VERSION}"
            exit 0
          fi
          git add "${CASK}"
          git commit -m "${QUALITY}: bump cask to ${VERSION}"
          git push
